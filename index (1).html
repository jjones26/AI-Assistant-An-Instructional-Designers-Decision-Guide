<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant: An Instructional Designer's Decision Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   AI Decision Guide — styles.css
   Light, clean, modern. One accent color. No decoration noise.
   ============================================================ */

/* --- Reset & tokens --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white:      #FFFFFF;
  --gray-50:    #F9FAFB;
  --gray-100:   #F3F4F6;
  --gray-200:   #E5E7EB;
  --gray-400:   #9CA3AF;
  --gray-600:   #4B5563;
  --gray-900:   #111827;
  --blue:       #2563EB;
  --blue-light: #EFF6FF;
  --blue-mid:   #DBEAFE;
  --green:      #16A34A;
  --green-light:#F0FDF4;
  --red:        #DC2626;
  --red-light:  #FEF2F2;
  --amber:      #D97706;
  --amber-light:#FFFBEB;

  --sidebar-w:  248px;
  --content-max: 680px;
  --radius:     8px;
  --radius-lg:  12px;
}

html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--white);
  color: var(--gray-900);
  min-height: 100vh;
  display: flex;
}

/* ============================================================
   SIDEBAR
   ============================================================ */

.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--white);
  border-right: 1px solid var(--gray-200);
  height: 100vh;
  position: fixed;
  top: 0;
  left: 0;
  display: flex;
  flex-direction: column;
  z-index: 50;
  overflow-y: auto;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--gray-200);
  margin-bottom: 8px;
  flex-shrink: 0;
}

.sidebar-logo-mark {
  background: var(--blue);
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 7px;
  border-radius: 5px;
  letter-spacing: 0.04em;
}

.sidebar-logo-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-900);
  line-height: 1.2;
}

/* Nav list */
.sidebar-nav {
  list-style: none;
  flex: 1;
  padding: 4px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-nav-item {
  position: relative;
}

.sidebar-nav-btn {
  width: 100%;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 8px;
  border-radius: 6px;
  text-align: left;
  transition: background 0.15s;
  font-family: 'Inter', sans-serif;
}

.sidebar-nav-btn:hover { background: var(--gray-100); }

.sidebar-nav-btn.active {
  background: var(--blue-light);
}

.sidebar-nav-btn.active .nav-dot { background: var(--blue); border-color: var(--blue); }
.sidebar-nav-btn.active .nav-label { color: var(--blue); font-weight: 600; }

.sidebar-nav-btn.completed .nav-dot {
  background: var(--blue);
  border-color: var(--blue);
}
.sidebar-nav-btn.completed .nav-dot::after {
  content: '';
  display: block;
  width: 5px;
  height: 3px;
  border-left: 1.5px solid white;
  border-bottom: 1.5px solid white;
  transform: rotate(-45deg) translate(1px, -1px);
}
.sidebar-nav-btn.completed .nav-label { color: var(--gray-600); }

.nav-dot {
  width: 14px;
  height: 14px;
  min-width: 14px;
  border-radius: 50%;
  border: 2px solid var(--gray-300, #D1D5DB);
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.nav-label {
  font-size: 12.5px;
  color: var(--gray-600);
  line-height: 1.3;
  font-weight: 400;
}

/* Sidebar section dividers */
.sidebar-section-header {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gray-400);
  padding: 12px 8px 4px;
}

/* Sidebar footer */
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--gray-200);
  flex-shrink: 0;
}

.sidebar-progress-label {
  font-size: 11px;
  color: var(--gray-400);
  margin-bottom: 8px;
}

.sidebar-progress-track {
  height: 3px;
  background: var(--gray-200);
  border-radius: 99px;
  overflow: hidden;
}

.sidebar-progress-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 99px;
  transition: width 0.4s ease;
  width: 0%;
}

/* ============================================================
   MAIN CONTENT AREA
   ============================================================ */

.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.page-container {
  flex: 1;
  padding: 64px 48px 40px;
  max-width: calc(var(--content-max) + 96px);
}

/* ============================================================
   PAGE TYPES
   ============================================================ */

.page {
  display: none;
  animation: pageFade 0.25s ease;
}
.page.active { display: block; }

@keyframes pageFade {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* --- Cover / Title page --- */
.page-cover {
  padding-top: 32px;
}

.cover-eyebrow {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 20px;
}

.cover-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(32px, 4vw, 46px);
  font-weight: 600;
  line-height: 1.15;
  color: var(--gray-900);
  margin-bottom: 20px;
  letter-spacing: -0.02em;
  max-width: 560px;
}

.cover-title em {
  font-style: italic;
  color: var(--blue);
}

.cover-desc {
  font-size: 17px;
  line-height: 1.7;
  color: var(--gray-600);
  max-width: 540px;
  margin-bottom: 36px;
}

.cover-meta {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 48px;
}

.cover-meta-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--gray-600);
}

.cover-meta-item svg {
  color: var(--gray-400);
  flex-shrink: 0;
}

.cover-divider {
  border: none;
  border-top: 1px solid var(--gray-200);
  margin: 0 0 36px;
}

.cover-audience {
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 24px 28px;
  max-width: 480px;
}

.cover-audience-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 8px;
}

.cover-audience p {
  font-size: 14px;
  line-height: 1.6;
  color: var(--gray-600);
}

/* --- Objectives page --- */
.page-objectives {}

.page-title {
  font-size: 24px;
  font-weight: 600;
  color: var(--gray-900);
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.page-subtitle {
  font-size: 15px;
  color: var(--gray-600);
  margin-bottom: 36px;
  line-height: 1.5;
}

.objectives-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 560px;
}

.objective-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  padding: 20px 22px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
}

.objective-num {
  width: 28px;
  height: 28px;
  min-width: 28px;
  background: var(--blue);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  margin-top: 1px;
}

.objective-text {
  font-size: 15px;
  line-height: 1.6;
  color: var(--gray-900);
}

/* --- Content pages --- */
.page-content {}

.content-section {
  margin-bottom: 36px;
}

.content-section:last-child { margin-bottom: 0; }

.section-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 10px;
}

.section-heading {
  font-size: 21px;
  font-weight: 600;
  color: var(--gray-900);
  margin-bottom: 14px;
  letter-spacing: -0.01em;
  line-height: 1.3;
}

.section-body {
  font-size: 15px;
  line-height: 1.75;
  color: var(--gray-600);
  max-width: 600px;
}

.section-body p { margin-bottom: 14px; }
.section-body p:last-child { margin-bottom: 0; }

.section-body strong { color: var(--gray-900); font-weight: 600; }

/* Info callout box */
.callout {
  border-left: 3px solid var(--blue);
  background: var(--blue-light);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 16px 20px;
  margin: 24px 0;
  font-size: 14px;
  line-height: 1.65;
  color: var(--gray-700, #374151);
  max-width: 600px;
}

.callout strong { color: var(--gray-900); }

/* Warning callout */
.callout-warn {
  border-left-color: var(--amber);
  background: var(--amber-light);
}

/* Tip / best practice */
.callout-tip {
  border-left-color: var(--green);
  background: var(--green-light);
}

/* Simple bullet list */
.content-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 16px 0;
  max-width: 580px;
}

.content-list li {
  display: flex;
  gap: 12px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--gray-600);
}

.content-list li::before {
  content: '';
  width: 6px;
  height: 6px;
  min-width: 6px;
  border-radius: 50%;
  background: var(--blue);
  margin-top: 8px;
}

.content-list li strong { color: var(--gray-900); }

/* Divider */
.content-divider {
  border: none;
  border-top: 1px solid var(--gray-200);
  margin: 36px 0;
}

/* ============================================================
   SCENARIO BLOCK
   ============================================================ */

.scenario-block {
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 28px 28px 24px;
  margin: 28px 0;
  max-width: 620px;
}

.scenario-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 12px;
}

.scenario-situation {
  font-size: 15px;
  line-height: 1.7;
  color: var(--gray-700, #374151);
}

.scenario-situation p { margin-bottom: 10px; }
.scenario-situation p:last-child { margin-bottom: 0; }

/* ============================================================
   QUESTION / QUIZ BLOCK
   ============================================================ */

.question-block {
  margin: 28px 0;
  max-width: 620px;
}

.question-prompt {
  font-size: 16px;
  font-weight: 600;
  color: var(--gray-900);
  line-height: 1.5;
  margin-bottom: 18px;
}

.question-choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.choice-option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius);
  cursor: pointer;
  background: var(--white);
  transition: border-color 0.15s, background 0.15s;
  text-align: left;
  width: 100%;
  font-family: 'Inter', sans-serif;
}

.choice-option:hover:not(.answered):not(:disabled) {
  border-color: var(--blue);
  background: var(--blue-light);
}

.choice-option:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
}

.choice-option.selected {
  border-color: var(--blue);
  background: var(--blue-light);
}

.choice-option.correct {
  border-color: var(--green);
  background: var(--green-light);
}

.choice-option.incorrect {
  border-color: var(--red);
  background: var(--red-light);
}

.choice-option.show-correct {
  border-color: var(--green);
  background: var(--green-light);
}

.choice-option:disabled { cursor: default; }

.choice-marker {
  width: 22px;
  height: 22px;
  min-width: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--gray-300, #D1D5DB);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--gray-400);
  background: var(--white);
  margin-top: 1px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.choice-option.selected .choice-marker {
  background: var(--blue);
  border-color: var(--blue);
  color: white;
}

.choice-option.correct .choice-marker {
  background: var(--green);
  border-color: var(--green);
  color: white;
}

.choice-option.incorrect .choice-marker {
  background: var(--red);
  border-color: var(--red);
  color: white;
}

.choice-option.show-correct .choice-marker {
  background: var(--green);
  border-color: var(--green);
  color: white;
}

.choice-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--gray-700, #374151);
  flex: 1;
}

/* Submit button */
.question-submit {
  padding: 10px 24px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
}

.question-submit:hover { background: #1D4ED8; }
.question-submit:disabled { opacity: 0.4; cursor: default; }
.question-submit:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
}

/* Feedback block */
.question-feedback {
  margin-top: 16px;
  padding: 16px 18px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.65;
  display: none;
}

.question-feedback.visible { display: block; }

.question-feedback.feedback-correct {
  background: var(--green-light);
  border: 1px solid #BBF7D0;
  color: #14532D;
}

.question-feedback.feedback-incorrect {
  background: var(--red-light);
  border: 1px solid #FECACA;
  color: #7F1D1D;
}

.feedback-verdict-line {
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ============================================================
   FINAL QUIZ (assessment) — distinct styling
   ============================================================ */

.assessment-header {
  background: var(--gray-900);
  color: white;
  border-radius: var(--radius-lg);
  padding: 28px 28px 24px;
  margin-bottom: 32px;
  max-width: 620px;
}

.assessment-header h2 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.assessment-header p {
  font-size: 14px;
  line-height: 1.6;
  opacity: 0.7;
}

/* ============================================================
   RESULTS / SUMMARY PAGE
   ============================================================ */

.results-score-block {
  text-align: center;
  padding: 40px 0 32px;
  max-width: 480px;
  margin: 0 auto;
}

.results-score-num {
  font-family: 'Fraunces', serif;
  font-size: 80px;
  font-weight: 600;
  color: var(--blue);
  line-height: 1;
  letter-spacing: -0.04em;
}

.results-score-denom {
  font-size: 20px;
  color: var(--gray-400);
  font-weight: 400;
}

.results-score-label {
  font-size: 16px;
  color: var(--gray-600);
  margin-top: 8px;
}

.results-message {
  font-size: 15px;
  line-height: 1.7;
  color: var(--gray-600);
  max-width: 520px;
  margin: 0 auto 40px;
  text-align: center;
  padding: 0 8px;
}

.results-breakdown {
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 0 auto 40px;
}

.results-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
}

.results-row-icon {
  font-size: 18px;
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}

.results-row-q {
  flex: 1;
  font-size: 13px;
  color: var(--gray-700, #374151);
  line-height: 1.4;
}

.results-row-badge {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 99px;
  white-space: nowrap;
}

.badge-correct { background: var(--green-light); color: var(--green); }
.badge-incorrect { background: var(--red-light); color: var(--red); }

.results-takeaways {
  max-width: 600px;
  margin: 0 auto 40px;
}

.results-takeaways h3 {
  font-size: 17px;
  font-weight: 600;
  color: var(--gray-900);
  margin-bottom: 16px;
}

.takeaway-item {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--gray-200);
  font-size: 14px;
  line-height: 1.6;
  color: var(--gray-600);
}

.takeaway-item:last-child { border-bottom: none; }
.takeaway-icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
.takeaway-item strong { color: var(--gray-900); }

.results-actions {
  display: flex;
  gap: 12px;
  max-width: 400px;
  margin: 0 auto;
  justify-content: center;
  flex-wrap: wrap;
}

.results-attribution {
  text-align: center;
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--gray-200);
  font-size: 13px;
  color: var(--gray-400);
  max-width: 600px;
}
.results-attribution a { color: var(--blue); text-decoration: none; }
.results-attribution a:hover { text-decoration: underline; }

/* ============================================================
   BOTTOM NAVIGATION
   ============================================================ */

.bottom-nav {
  border-top: 1px solid var(--gray-200);
  background: var(--white);
  padding: 16px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  bottom: 0;
  margin-left: 0;
}

.btn-back {
  background: none;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 9px 20px;
  font-size: 14px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  color: var(--gray-600);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  min-width: 100px;
}

.btn-back:hover { border-color: var(--gray-900); color: var(--gray-900); }
.btn-back:disabled { opacity: 0.3; cursor: default; }
.btn-back:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

.bottom-nav-center {
  font-size: 13px;
  color: var(--gray-400);
  text-align: center;
}

.btn-continue {
  background: var(--blue);
  border: none;
  border-radius: var(--radius);
  padding: 10px 22px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  color: white;
  cursor: pointer;
  transition: background 0.15s;
  min-width: 120px;
}

.btn-continue:hover { background: #1D4ED8; }
.btn-continue:disabled { opacity: 0.35; cursor: default; }
.btn-continue:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

.btn-restart {
  background: none;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 9px 20px;
  font-size: 14px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  color: var(--gray-600);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}

.btn-restart:hover { border-color: var(--gray-900); color: var(--gray-900); }

.btn-portfolio {
  background: var(--blue);
  border: none;
  border-radius: var(--radius);
  padding: 9px 20px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  color: white;
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}

.btn-portfolio:hover { background: #1D4ED8; }

/* ============================================================
   MOBILE NAV TOGGLE
   ============================================================ */

.mobile-nav-toggle {
  display: none;
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 200;
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: 6px;
  padding: 8px 10px;
  cursor: pointer;
  flex-direction: column;
  gap: 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

.mobile-nav-toggle span {
  display: block;
  width: 18px;
  height: 2px;
  background: var(--gray-600);
  border-radius: 2px;
}

.mobile-nav-overlay {

/**
 * app.js
 * AI Assistant: An Instructional Designer's Decision Guide
 *
 * Manages:
 *  - Page rendering from PAGES data
 *  - Sidebar navigation state
 *  - Forward/back navigation
 *  - Inline question interactions
 *  - Assessment scoring
 *  - Results page generation
 */

// ─────────────────────────────────
// STATE
// ─────────────────────────────────

const STATE = {
  currentPage: 0,
  completedPages: new Set(),
  // For inline questions: tracks which have been answered
  answeredQuestions: {},   // { questionId: choiceIndex }
  // For assessment: tracks answers before submit
  assessmentAnswers: {},   // { questionId: choiceIndex }
  assessmentSubmitted: false,
  assessmentScore: 0
};

// ─────────────────────────────────
// INIT
// ─────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  renderPage(0);
  setupMobileNav();
});

// ─────────────────────────────────
// SIDEBAR
// ─────────────────────────────────

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';

  PAGES.forEach((page, i) => {
    const li = document.createElement('li');
    li.className = 'sidebar-nav-item';

    const btn = document.createElement('button');
    btn.className = 'sidebar-nav-btn';
    btn.id = `nav-btn-${i}`;
    btn.setAttribute('aria-current', i === 0 ? 'page' : 'false');
    btn.onclick = () => goToPage(i);

    btn.innerHTML = `
      <span class="nav-dot" aria-hidden="true"></span>
      <span class="nav-label">${page.navLabel}</span>
    `;

    li.appendChild(btn);
    nav.appendChild(li);
  });

  updateSidebar();
}

function updateSidebar() {
  const total = PAGES.length;
  const current = STATE.currentPage;
  const completed = STATE.completedPages.size;

  // Update nav buttons
  document.querySelectorAll('.sidebar-nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === current);
    btn.classList.toggle('completed', STATE.completedPages.has(i) && i !== current);
    btn.setAttribute('aria-current', i === current ? 'page' : 'false');
  });

  // Progress bar
  const pct = Math.round((completed / total) * 100);
  document.getElementById('sidebarProgressFill').style.width = pct + '%';
  document.getElementById('sidebarProgressText').textContent =
    `Page ${current + 1} of ${total}`;
}

// ─────────────────────────────────
// NAVIGATION
// ─────────────────────────────────

function goToPage(index) {
  if (index < 0 || index >= PAGES.length) return;

  // Mark current as completed before leaving
  STATE.completedPages.add(STATE.currentPage);
  STATE.currentPage = index;

  renderPage(index);
  updateSidebar();
  updateBottomNav();
  closeMobileNav();

  // Scroll to top
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goForward() {
  const page = PAGES[STATE.currentPage];

  // Block advance on assessment until submitted
  if (page.type === 'assessment' && !STATE.assessmentSubmitted) {
    const allAnswered = page.questions.every(q => STATE.assessmentAnswers[q.id] !== undefined);
    if (!allAnswered) {
      showValidationHint('Answer all questions before continuing.');
      return;
    }
    submitAssessment();
    return;
  }

  goToPage(STATE.currentPage + 1);
}

function goBack() {
  if (STATE.currentPage > 0) {
    goToPage(STATE.currentPage - 1);
  }
}

function updateBottomNav() {
  const index = STATE.currentPage;
  const page = PAGES[index];
  const total = PAGES.length;

  const btnBack = document.getElementById('btnBack');
  const btnContinue = document.getElementById('btnContinue');
  const center = document.getElementById('bottomNavCenter');

  btnBack.disabled = index === 0;

  // Last page (results): hide continue, show different CTA
  if (page.type === 'results') {
    btnContinue.style.display = 'none';
    center.innerHTML = '';
  } else {
    btnContinue.style.display = '';
    btnContinue.textContent = (index === total - 2) ? 'See Results →' :
                              (page.type === 'assessment' && !STATE.assessmentSubmitted) ? 'Submit →' :
                              'Continue →';
    center.textContent = `${index + 1} / ${total}`;
  }
}

function showValidationHint(msg) {
  const center = document.getElementById('bottomNavCenter');
  center.innerHTML = `<span style="color:#DC2626;font-size:13px;">${msg}</span>`;
  setTimeout(() => updateBottomNav(), 3000);
}

// ─────────────────────────────────
// PAGE RENDERER
// ─────────────────────────────────

function renderPage(index) {
  const page = PAGES[index];
  const container = document.getElementById('pageContainer');

  let html = '';

  switch (page.type) {
    case 'cover':      html = renderCover(page); break;
    case 'objectives': html = renderObjectives(page); break;
    case 'content':    html = renderContent(page); break;
    case 'assessment': html = renderAssessment(page); break;
    case 'results':    html = renderResults(); break;
  }

  container.innerHTML = `<div class="page active" id="page-${page.id}">${html}</div>`;

  // Wire up interactions
  if (page.type === 'content' && page.question) {
    setupQuestion(page.question);
  }
  if (page.type === 'assessment') {
    setupAssessment(page);
  }

  updateBottomNav();
}

// ─────────────────────────────────
// COVER PAGE
// ─────────────────────────────────

function renderCover(page) {
  const metaIcons = {
    clock: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    pages: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
    quiz: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`
  };

  const metaHtml = page.meta.map(m =>
    `<div class="cover-meta-item">${metaIcons[m.icon] || ''}<span>${m.text}</span></div>`
  ).join('');

  return `
    <div class="page-cover">
      <p class="cover-eyebrow">${page.eyebrow}</p>
      <h1 class="cover-title">${page.title}</h1>
      <p class="cover-desc">${page.description}</p>
      <div class="cover-meta">${metaHtml}</div>
      <hr class="cover-divider" />
      <div class="cover-audience">
        <p class="cover-audience-label">${page.audienceLabel}</p>
        <p>${page.audience}</p>
      </div>
    </div>
  `;
}

// ─────────────────────────────────
// OBJECTIVES PAGE
// ─────────────────────────────────

function renderObjectives(page) {
  const items = page.objectives.map((obj, i) =>
    `<li class="objective-item">
       <span class="objective-num">${i + 1}</span>
       <span class="objective-text">${obj}</span>
     </li>`
  ).join('');

  return `
    <div class="page-objectives">
      <h1 class="page-title">${page.title}</h1>
      <p class="page-subtitle">${page.subtitle}</p>
      <ul class="objectives-list">${items}</ul>
    </div>
  `;
}

// ─────────────────────────────────
// CONTENT PAGE
// ─────────────────────────────────

function renderContent(page) {
  const sectionsHtml = page.sections.map(s => renderSection(s)).join('');
  const questionHtml = page.question ? renderQuestion(page.question) : '';

  return `
    <div class="page-content">
      ${sectionsHtml}
      ${questionHtml ? `<hr class="content-divider" />${questionHtml}` : ''}
    </div>
  `;
}

function renderSection(s) {
  // Callout block
  if (s.type === 'callout') {
    const variantClass = s.variant === 'warn' ? 'callout-warn' : s.variant === 'tip' ? 'callout-tip' : '';
    return `<div class="callout ${variantClass}">${s.text}</div>`;
  }
  // Scenario block
  if (s.type === 'scenario') {
    return `
      <div class="scenario-block">
        <p class="scenario-label">${s.label || 'Scenario'}</p>
        <div class="scenario-situation">${s.text}</div>
      </div>
    `;
  }

  // Regular section
  let html = '<div class="content-section">';
  if (s.eyebrow) html += `<p class="section-eyebrow">${s.eyebrow}</p>`;
  if (s.heading) html += `<h2 class="section-heading">${s.heading}</h2>`;
  if (s.body)    html += `<div class="section-body">${s.body}</div>`;
  if (s.list) {
    html += `<ul class="content-list">` +
      s.list.map(item => `<li>${item}</li>`).join('') +
      `</ul>`;
  }
  html += '</div>';
  return html;
}

// ─────────────────────────────────
// INLINE QUESTION
// ─────────────────────────────────

function renderQuestion(q) {
  const letters = ['A', 'B', 'C', 'D'];
  const choicesHtml = q.choices.map((text, i) =>
    `<button class="choice-option" data-qid="${q.id}" data-index="${i}"
             onclick="handleInlineChoice('${q.id}', ${i})">
       <span class="choice-marker">${letters[i]}</span>
       <span class="choice-text">${text}</span>
     </button>`
  ).join('');

  return `
    <div class="question-block" id="qblock-${q.id}">
      <p class="question-prompt">${q.prompt}</p>
      <div class="question-choices" id="qchoices-${q.id}" role="group" aria-label="Answer choices">
        ${choicesHtml}
      </div>
      <button class="question-submit" id="qsubmit-${q.id}"
              onclick="submitInlineQuestion('${q.id}')" disabled>
        Check Answer
      </button>
      <div class="question-feedback" id="qfeedback-${q.id}" role="alert" aria-live="polite"></div>
    </div>
  `;
}

function setupQuestion(q) {
  // If already answered in this session, restore the state
  if (STATE.answeredQuestions[q.id] !== undefined) {
    revealInlineFeedback(q.id, STATE.answeredQuestions[q.id], q);
  }
}

function handleInlineChoice(qid, index) {
  if (STATE.answeredQuestions[qid] !== undefined) return;

  // Deselect all, select clicked
  document.querySelectorAll(`[data-qid="${qid}"]`).forEach(btn => {
    btn.classList.remove('selected');
  });
  const btn = document.querySelector(`[data-qid="${qid}"][data-index="${index}"]`);
  if (btn) btn.classList.add('selected');

  // Enable submit
  const submitBtn = document.getElementById(`qsubmit-${qid}`);
  if (submitBtn) {
    submitBtn.disabled = false;
    submitBtn._pendingIndex = index;
  }
}

function submitInlineQuestion(qid) {
  const submitBtn = document.getElementById(`qsubmit-${qid}`);
  if (!submitBtn || submitBtn.disabled) return;

  const index = submitBtn._pendingIndex;
  if (index === undefined) return;

  // Find the question data
  const page = PAGES[STATE.currentPage];
  const q = page.question;
  if (!q) return;

  STATE.answeredQuestions[qid] = index;
  revealInlineFeedback(qid, index, q);
}

function revealInlineFeedback(qid, selectedIndex, q) {
  const isCorrect = selectedIndex === q.correct;

  // Style choices
  document.querySelectorAll(`[data-qid="${qid}"]`).forEach((btn, i) => {
    btn.disabled = true;
    btn.classList.add('answered');
    btn.classList.remove('selected');
    if (i === selectedIndex && isCorrect) btn.classList.add('correct');
    else if (i === selectedIndex && !isCorrect) btn.classList.add('incorrect');
    else if (i === q.correct) btn.classList.add('show-correct');
  });

  // Hide submit
  const submitBtn = document.getElementById(`qsubmit-${qid}`);
  if (submitBtn) submitBtn.style.display = 'none';

  // Show feedback
  const feedbackEl = document.getElementById(`qfeedback-${qid}`);
  if (feedbackEl) {
    feedbackEl.className = `question-feedback visible ${isCorrect ? 'feedback-correct' : 'feedback-incorrect'}`;
    feedbackEl.innerHTML = `
      <div class="feedback-verdict-line">
        ${isCorrect ? '✓ Correct' : '✗ Incorrect'}
      </div>
      ${q.feedback[selectedIndex]}
    `;
  }
}

// ─────────────────────────────────
// ASSESSMENT PAGE
// ─────────────────────────────────

function renderAssessment(page) {
  const questionsHtml = page.questions.map((q, qi) => {
    const letters = ['A', 'B', 'C', 'D'];
    const choices = q.choices.map((text, i) =>
      `<button class="choice-option" data-aqid="${q.id}" data-index="${i}"
               onclick="handleAssessmentChoice('${q.id}', ${i})">
         <span class="choice-marker">${letters[i]}</span>
         <span class="choice-text">${text}</span>
       </button>`
    ).join('');

    return `
      <div class="question-block" id="aqblock-${q.id}" style="margin-bottom:32px;">
        <p class="question-prompt" style="margin-bottom:14px;">
          <span style="color:var(--gray-400);font-weight:400;font-size:13px;">Question ${qi + 1} of ${page.questions.length}</span><br/>
          ${q.prompt}
        </p>
        <div class="question-choices" id="aqchoices-${q.id}" role="group" aria-label="Answer choices">
          ${choices}
        </div>
        <div class="question-feedback" id="aqfeedback-${q.id}" role="alert" aria-live="polite"></div>
      </div>
    `;
  }).join('<hr class="content-divider" />');

  return `
    <div class="assessment-header">
      <h2>${page.title}</h2>
      <p>${page.subtitle}</p>
    </div>
    ${questionsHtml}
  `;
}

function setupAssessment(page) {
  // If already submitted in session, restore state
  if (STATE.assessmentSubmitted) {
    revealAssessmentResults(page);
  }
}

function handleAssessmentChoice(qid, index) {
  if (STATE.assessmentSubmitted) return;

  STATE.assessmentAnswers[qid] = index;

  // Update UI: deselect all for this question, select clicked
  document.querySelectorAll(`[data-aqid="${qid}"]`).forEach(btn => {
    btn.classList.remove('selected');
  });
  const btn = document.querySelector(`[data-aqid="${qid}"][data-index="${index}"]`);
  if (btn) btn.classList.add('selected');

  updateBottomNav();
}

function submitAssessment() {
  const page = PAGES[STATE.currentPage];

  // Check all answered
  const allAnswered = page.questions.every(q => STATE.assessmentAnswers[q.id] !== undefined);
  if (!allAnswered) {
    showValidationHint('Please answer all questions first.');
    return;
  }

  STATE.assessmentSubmitted = true;

  // Score
  let score = 0;
  page.questions.forEach(q => {
    if (STATE.assessmentAnswers[q.id] === q.correct) score++;
  });
  STATE.assessmentScore = score;

  revealAssessmentResults(page);

  // Advance the continue button
  const btnContinue = document.getElementById('btnContinue');
  btnContinue.textContent = 'See Results →';
}

function revealAssessmentResults(page) {
  page.questions.forEach(q => {
    const selectedIndex = STATE.assessmentAnswers[q.id];
    if (selectedIndex === undefined) return;
    const isCorrect = selectedIndex === q.correct;

    document.querySelectorAll(`[data-aqid="${q.id}"]`).forEach((btn, i) => {
      btn.disabled = true;
      btn.classList.remove('selected');
      if (i === selectedIndex && isCorrect) btn.classList.add('correct');
      else if (i === selectedIndex && !isCorrect) btn.classList.add('incorrect');
      else if (i === q.correct) btn.classList.add('show-correct');
    });

    const feedbackEl = document.getElementById(`aqfeedback-${q.id}`);
    const isCorrect2 = selectedIndex === q.correct;
    if (feedbackEl) {
      feedbackEl.className = `question-feedback visible ${isCorrect2 ? 'feedback-correct' : 'feedback-incorrect'}`;
      feedbackEl.innerHTML = `
        <div class="feedback-verdict-line">${isCorrect2 ? '✓ Correct' : '✗ Incorrect'}</div>
        ${q.feedback[selectedIndex]}
      `;
    }
  });
}

// ─────────────────────────────────
// RESULTS PAGE
// ─────────────────────────────────

function renderResults() {
  const page = PAGES.find(p => p.type === 'results');
  const score = STATE.assessmentScore;
  const total = 5; // assessment questions
  const pct = Math.round((score / total) * 100);

  let message = '';
  if (pct === 100) {
    message = "Perfect score. You have a strong command of responsible AI use in instructional design — the judgment to move quickly without cutting corners that matter.";
  } else if (pct >= 80) {
    message = "You got most of it right. A strong foundation for AI-assisted design work. Review any questions you missed — the nuances there are worth sitting with.";
  } else if (pct >= 60) {
    message = "Solid progress. A few areas to revisit, particularly around verification and data privacy — the stakes there are high enough that getting them right matters.";
  } else {
    message = "There are a few areas worth revisiting before putting these concepts into practice. The key principles below summarize what to take with you.";
  }

  // Assessment breakdown
  const assessmentPage = PAGES.find(p => p.type === 'assessment');
  const breakdownHtml = assessmentPage ? assessmentPage.questions.map(q => {
    const selected = STATE.assessmentAnswers[q.id];
    const isCorrect = selected === q.correct;
    return `
      <div class="results-row">
        <div class="results-row-icon">${isCorrect ? '✓' : '✗'}</div>
        <div class="results-row-q">${q.prompt}</div>
        <div class="results-row-badge ${isCorrect ? 'badge-correct' : 'badge-incorrect'}">
          ${isCorrect ? 'Correct' : 'Incorrect'}
        </div>
      </div>
    `;
  }).join('') : '';

  const takeawaysHtml = page.takeaways.map(t => `
    <div class="takeaway-item">
      <span class="takeaway-icon">${t.icon}</span>
      <div><strong>${t.heading}</strong><br/>${t.body}</div>
    </div>
  `).join('');

  return `
    <div class="results-score-block">
      <div>
        <span class="results-score-num">${score}</span>
        <span class="results-score-denom"> / ${total}</span>
      </div>
      <p class="results-score-label">Knowledge Check Score</p>
    </div>
    <p class="results-message">${message}</p>

    ${breakdownHtml ? `
    <div class="results-breakdown">
      <h3 style="font-size:16px;font-weight:600;color:var(--gray-900);margin-bottom:14px;padding:0 8px;">Your Answers</h3>
      ${breakdownHtml}
    </div>` : ''}

    <div class="results-takeaways" style="max-width:620px;margin:0 auto 40px;padding:0 8px;">
      <h3>Key Takeaways</h3>
      ${takeawaysHtml}
    </div>

    <div class="results-actions">
      <button class="btn-restart" onclick="restartModule()">↺ Restart Module</button>
      <a class="btn-portfolio" href="https://jacobjones.dev" target="_blank" rel="noopener">
        View Portfolio →
      </a>
    </div>

    <div class="results-attribution">
      <p>Created by <strong>Jake Jones</strong> · Instructional Designer &amp; Developer<br/>
      <a href="https://jacobjones.dev" target="_blank" rel="noopener">jacobjones.dev</a></p>
    </div>
  `;
}

// ─────────────────────────────────
// MODULE RESTART
// ─────────────────────────────────

function restartModule() {
  STATE.currentPage = 0;
  STATE.completedPages = new Set();
  STATE.answeredQuestions = {};
  STATE.assessmentAnswers = {};
  STATE.assessmentSubmitted = false;
  STATE.assessmentScore = 0;

  buildSidebar();
  renderPage(0);
  updateBottomNav();

  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ─────────────────────────────────
// MOBILE NAV
// ─────────────────────────────────

function setupMobileNav() {
  const toggle = document.getElementById('mobileNavToggle');
  const overlay = document.getElementById('mobileNavOverlay');

  toggle.addEventListener('click', () => {
    const isOpen = document.getElementById('sidebar').classList.contains('open');
    if (isOpen) closeMobileNav();
    else openMobileNav();
  });

  overlay.addEventListener('click', closeMobileNav);
}

function openMobileNav() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mobileNavOverlay').classList.add('visible');
  document.getElementById('mobileNavToggle').setAttribute('aria-expanded', 'true');
}

function closeMobileNav() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileNavOverlay').classList.remove('visible');
  document.getElementById('mobileNavToggle').setAttribute('aria-expanded', 'false');
}
  </script>
</body>
