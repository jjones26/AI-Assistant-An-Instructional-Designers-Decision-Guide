<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant: An Instructional Designer's Decision Guide</title>
  <meta name="description" content="An interactive learning module for instructional designers exploring how to use AI effectively and responsibly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar" aria-label="Module navigation">
    <div class="sidebar-logo">
      <span class="sidebar-logo-mark">AI</span>
      <span class="sidebar-logo-text">Decision Guide</span>
    </div>
    <ol class="sidebar-nav" id="sidebarNav">
      <!-- Injected by JS -->
    </ol>
    <div class="sidebar-footer">
      <div class="sidebar-progress-label">
        <span id="sidebarProgressText">Page 1 of 12</span>
      </div>
      <div class="sidebar-progress-track">
        <div class="sidebar-progress-fill" id="sidebarProgressFill"></div>
      </div>
    </div>
  </nav>

  <!-- Mobile nav toggle -->
  <button class="mobile-nav-toggle" id="mobileNavToggle" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-nav-overlay" id="mobileNavOverlay"></div>

  <!-- Main content -->
  <main class="main" id="main">
    <div class="page-container" id="pageContainer">
      <!-- Pages injected by JS -->
    </div>

    <!-- Bottom navigation -->
    <div class="bottom-nav" id="bottomNav">
      <button class="btn-back" id="btnBack" onclick="goBack()" aria-label="Go to previous page">
        ← Back
      </button>
      <div class="bottom-nav-center" id="bottomNavCenter">
        <!-- Page indicator or completion state -->
      </div>
      <button class="btn-continue" id="btnContinue" onclick="goForward()" aria-label="Continue to next page">
        Continue →
      </button>
    </div>
  </main>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
